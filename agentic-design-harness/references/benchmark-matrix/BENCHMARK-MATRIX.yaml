# Regulatory / compliance filters — eliminate or penalize models
compliance_filters:
  self_hosted_only:
    eliminate_hosting: [api]
    unless: private_endpoint_available  # future: Azure OpenAI, Bedrock VPC

  phi_pci_regulated:
    recommend: [self_hosted]
    penalize_api_unless: [private_endpoints_only, baa_in_place]

  gdpr_eu_residency:
  # No model elimination — hosting/deployment constraint
    require: [eu_region_deployment, dpa_in_place]
    penalize: [us_only_api_without_dpa]

  model_logging_prohibited:
    require: [zero_retention_api OR self_hosted]
    note: "Check provider ZDR / enterprise agreements"

  air_gapped:
    eliminate_hosting: [api]
    allowed: [self_hosted]

# Composite scoring weights when merging benchmark + KPI scores
selection_blend:
  benchmark_score_weight: 0.55   # task-fit from flow
  kpi_score_weight: 0.35         # from define-kpis step
  compliance_fit_weight: 0.10    # regulatory/network fit

# Per-step model assignment (optional advanced output)
per_step_assignment:
  enabled: true
  description: |
    For each flow step, compute benchmark score for that step's task_types.
    Flow-level primary = highest weighted score across all steps.
    Report per-step recommendations in artifact appendix.

# Rainy day scenario → capability requirements
rainy_day_capability_map:
  missing_data:
    required_task_strength: [conversation, reasoning]
    min_score_threshold: 0.75
  system_timeout:
    required_capabilities: [retry_logic, graceful_degradation]
    model_note: "Prefer models with reliable tool_use >= 0.80"
  fraud_abuse:
    required_capabilities: [classification, guardrails]
    recommend_t4_classifier: true
  regulatory_edge:
    required_task_strength: [reasoning, rag_retrieval]
    hitl_recommended: true
  ambiguous_intent:
    required_task_strength: [conversation, classification]
