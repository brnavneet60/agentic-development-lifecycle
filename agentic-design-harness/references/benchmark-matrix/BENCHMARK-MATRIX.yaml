# Benchmark-Aware Model Selection Matrix v0.2.0
# Maps business-flow task types → benchmark categories → model scores
#
# DISCLAIMER: Scores are indicative relative rankings for design-time selection.
# Sources should be validated before production decisions. Marked "needs_validation"
# where community benchmarks drift frequently.
#
# Scoring: 0.0–1.0 relative suitability (not raw benchmark %)
# Last updated: 2026-07-06

version: "0.2.0"
last_updated: "2026-07-06"

# How to derive task types from flow steps (capture-business-flow tags each step)
task_types:

  classification:
    description: "Intent routing, categorization, triage"
    flow_signals: [routing, triage, intent, categorize, classify]
    benchmarks:
      - id: mmlu
        name: "MMLU (knowledge classification)"
        weight: 0.3
        source: "https://arxiv.org/abs/2009.03300"
      - id: intent_accuracy
        name: "Intent classification (domain eval)"
        weight: 0.7
        note: "Use customer eval in Phase 2; proxy scores below"
    model_scores:
      gpt-4o: 0.88
      gpt-4o-mini: 0.82
      gpt-4.1: 0.90
      claude-sonnet-4: 0.89
      claude-haiku-4.5: 0.80
      gemini-2.0-flash: 0.85
      llama-3.1-70b: 0.78
      llama-3.1-8b: 0.70
      qwen2.5-72b: 0.80
      mistral-large: 0.82
      phi-4: 0.72
      llama-3.2-3b: 0.65

  extraction:
