outputs:
  format: markdown
  standards_path: OUTPUT-STANDARDS.md
  # Canonical body lives in outputs/templates/default.md (OUTPUT-STANDARDS shape).
  # Keep a short stub here for deliverers that read config.template directly.
  template: |
    # See outputs/templates/default.md — OUTPUT-STANDARDS v1 required.
    # Hard boundaries: sequence≠end-state; propose→authorize→execute; named models;
    # Knowledge≠Memory; tool recall/param accuracy; AuthZ Authorize column; full Evidence URLs.
  deliverers:
    - type: local_file
      path: agents-output/{{harness_name}}/{{slug}}/{{slug}}-technical-design.md
